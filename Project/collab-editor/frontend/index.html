<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Collab Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0f14;--sur:#13161e;--pan:#1a1e28;--bdr:#252a38;
  --acc:#5f6fff;--acc2:#a78bfa;--grn:#34d399;--red:#f87171;
  --txt:#e8eaf0;--mut:#6b7280;--glow:rgba(95,111,255,.18);
}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:'Syne',sans-serif;overflow:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.4;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E")}
.blob{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0}
.blob1{width:480px;height:480px;top:-100px;left:-80px;background:rgba(95,111,255,.06)}
.blob2{width:380px;height:380px;bottom:-80px;right:-60px;background:rgba(167,139,250,.05)}

/* layout */
#app{position:relative;z-index:1;display:flex;flex-direction:column;height:100vh}

/* header */
header{display:flex;align-items:center;gap:8px;padding:0 18px;height:52px;
  background:var(--sur);border-bottom:1px solid var(--bdr);flex-shrink:0}
.logo{display:flex;align-items:center;gap:7px;font-weight:800;font-size:16px;letter-spacing:-.4px;white-space:nowrap}
.logo-icon{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,var(--acc),var(--acc2));
  display:grid;place-items:center;font-size:12px;box-shadow:0 0 12px var(--glow);flex-shrink:0}
.logo-acc{color:var(--acc)}
.sp{flex:1}
.doc-pill{display:flex;align-items:center;gap:5px;background:var(--pan);border:1px solid var(--bdr);
  border-radius:18px;padding:3px 10px 3px 8px;transition:border-color .2s}
.doc-pill:focus-within{border-color:var(--acc)}
.doc-pill span{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut)}
.doc-pill input{background:none;border:none;outline:none;color:var(--txt);
  font-family:'JetBrains Mono',monospace;font-size:12px;width:52px}
.badge{display:flex;align-items:center;gap:5px;font-size:11px;padding:3px 10px;
  border-radius:18px;border:1px solid var(--bdr);background:var(--pan);white-space:nowrap}
.dot{width:6px;height:6px;border-radius:50%;background:var(--mut);flex-shrink:0;transition:all .3s}
.badge.conn .dot{background:var(--grn);box-shadow:0 0 6px var(--grn)}
.badge.conn{border-color:rgba(52,211,153,.3);color:var(--grn)}
.badge.err .dot{background:var(--red)}
.badge.err{border-color:rgba(248,113,113,.25);color:var(--red)}
.badge.wait .dot{background:var(--acc);animation:blink 1s infinite}
.badge.wait{color:var(--mut)}
@keyframes blink{50%{opacity:.2}}
.btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:7px;
  font-family:'Syne',sans-serif;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .15s;white-space:nowrap}
.ghost{background:transparent;color:var(--mut);border:1px solid var(--bdr)}
.ghost:hover{background:var(--pan);color:var(--txt);border-color:var(--acc)}
.prim{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;box-shadow:0 0 14px var(--glow)}
.prim:hover{transform:translateY(-1px);box-shadow:0 4px 20px var(--glow)}

/* toolbar */
.toolbar{display:flex;align-items:center;height:38px;padding:0 14px;gap:2px;
  background:var(--sur);border-bottom:1px solid var(--bdr);flex-shrink:0;overflow-x:auto}
.toolbar::-webkit-scrollbar{height:0}
.tsep{width:1px;height:20px;background:var(--bdr);margin:0 4px;flex-shrink:0}
.tb{width:28px;height:28px;border-radius:5px;border:none;background:transparent;
  color:var(--mut);cursor:pointer;display:grid;place-items:center;transition:all .12s;flex-shrink:0}
.tb:hover{background:var(--pan);color:var(--txt)}
.tb.on{background:rgba(95,111,255,.18);color:var(--acc)}
.tb svg{pointer-events:none;display:block}
.tb-label{font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace;line-height:1}
.tsel{height:26px;padding:0 6px;background:var(--pan);border:1px solid var(--bdr);
  color:var(--txt);border-radius:5px;font-size:11px;font-family:'Syne',sans-serif;
  cursor:pointer;outline:none;flex-shrink:0}
.counts{margin-left:auto;display:flex;gap:10px;font-size:10px;color:var(--mut);
  font-family:'JetBrains Mono',monospace;white-space:nowrap;padding:0 4px}
.counts b{color:var(--txt);font-weight:500}

/* editor */
.ewrap{flex:1;overflow:hidden;display:flex;flex-direction:column;align-items:center;
  padding:18px 18px 0;background:var(--bg)}
.page{width:100%;max-width:820px;flex:1;border-radius:10px 10px 0 0;overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:0 -2px 40px rgba(0,0,0,.5),0 0 0 1px var(--bdr);background:var(--sur)}
.ruler-row{height:18px;background:var(--pan);border-bottom:1px solid var(--bdr);
  position:relative;flex-shrink:0}
#editor{
  flex:1;width:100%;border:none;outline:none;resize:none;
  background:transparent;color:var(--txt);
  font-family:'JetBrains Mono',monospace;font-size:15px;line-height:1.8;
  padding:28px 44px;
  caret-color:var(--acc);
  scrollbar-width:thin;scrollbar-color:var(--bdr) transparent}
#editor::-webkit-scrollbar{width:5px}
#editor::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
/* rich text inherited styles */
#editor:focus{outline:none}
#editor h1{font-size:2em;font-weight:800;margin:0 0 .4em;font-family:'Syne',sans-serif;line-height:1.2}
#editor h2{font-size:1.5em;font-weight:700;margin:0 0 .4em;font-family:'Syne',sans-serif;line-height:1.3}
#editor h3{font-size:1.2em;font-weight:600;margin:0 0 .4em;font-family:'Syne',sans-serif;line-height:1.4}
#editor ul,#editor ol{padding-left:1.6em;margin:.3em 0}
#editor li{margin:.1em 0}
#editor blockquote{border-left:3px solid var(--acc);padding-left:1em;color:var(--mut);margin:.4em 0;font-style:italic}
#editor a{color:var(--acc);text-decoration:underline}
#editor code{background:var(--pan);padding:.1em .35em;border-radius:4px;font-size:.9em}
#editor p{margin:0;min-height:1.8em}
/* placeholder */
#editor:empty::before{content:attr(data-ph);color:var(--mut);opacity:.4;pointer-events:none;
  font-family:'JetBrains Mono',monospace}

/* status bar */
.sbar{display:flex;align-items:center;height:24px;padding:0 18px;gap:0;
  background:var(--sur);border-top:1px solid var(--bdr);flex-shrink:0;
  font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--mut)}
.si{padding:0 10px;border-right:1px solid var(--bdr);white-space:nowrap}
.si:first-child{padding-left:0}
.si:last-child{border:none}
.si.grn{color:var(--grn)}
.si.anim{color:var(--acc2);animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.35}}

/* toast */
#toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(12px);
  background:var(--pan);border:1px solid var(--bdr);color:var(--txt);
  padding:8px 16px;border-radius:8px;font-size:12px;opacity:0;
  pointer-events:none;transition:all .22s;z-index:9999;
  box-shadow:0 6px 24px rgba(0,0,0,.4);white-space:nowrap}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* splash */
#splash{position:fixed;inset:0;z-index:9000;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;
  transition:opacity .3s}
#splash.gone{opacity:0;pointer-events:none}
.spl-logo{font-size:28px;font-weight:800;letter-spacing:-.8px}
.spl-logo b{color:var(--acc);font-weight:800}
.spl-spin{width:28px;height:28px;border-radius:50%;
  border:2px solid var(--bdr);border-top-color:var(--acc);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spl-sub{font-size:11px;color:var(--mut)}

@keyframes fup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
header{animation:fup .3s both}
.toolbar{animation:fup .3s .06s both}
.ewrap{animation:fup .3s .12s both}
</style>
</head>
<body>
<div class="blob1 blob"></div>
<div class="blob2 blob"></div>

<div id="splash">
  <div class="spl-logo">collab<b>.</b>edit</div>
  <div class="spl-spin"></div>
  <div class="spl-sub" id="splSub">Connecting…</div>
</div>

<div id="app">
  <header>
    <div class="logo">
      <div class="logo-icon">✦</div>
      collab<span class="logo-acc">.</span>edit
    </div>
    <div class="doc-pill">
      <span>doc</span>
      <input id="docIn" value="1" maxlength="20" title="Document ID" autocomplete="off"/>
    </div>
    <button class="btn ghost" id="btnLoad">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.18-5.48"/></svg>
      Load
    </button>
    <div class="sp"></div>
    <div class="badge wait" id="netBadge">
      <div class="dot"></div><span id="netTxt">Connecting…</span>
    </div>
    <button class="btn ghost" id="btnShare">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      Share
    </button>
    <button class="btn prim" id="btnExport">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export
    </button>
  </header>

  <div class="toolbar" id="toolbar">
    <!-- font / size -->
    <select class="tsel" id="selFont">
      <option value="mono">Monospace</option>
      <option value="syne">Syne</option>
      <option value="serif">Serif</option>
      <option value="sys">System</option>
    </select>
    <div style="width:4px"></div>
    <select class="tsel" id="selSize">
      <option value="13">13px</option>
      <option value="15" selected>15px</option>
      <option value="17">17px</option>
      <option value="20">20px</option>
      <option value="24">24px</option>
    </select>
    <div class="tsep"></div>
    <!-- text format -->
    <button class="tb" id="tb-b"  title="Bold (Ctrl+B)"><span class="tb-label" style="font-weight:900">B</span></button>
    <button class="tb" id="tb-i"  title="Italic (Ctrl+I)"><span class="tb-label" style="font-style:italic;font-weight:400">I</span></button>
    <button class="tb" id="tb-u"  title="Underline (Ctrl+U)"><span class="tb-label" style="text-decoration:underline">U</span></button>
    <button class="tb" id="tb-s"  title="Strikethrough"><span class="tb-label" style="text-decoration:line-through">S</span></button>
    <div class="tsep"></div>
    <!-- headings -->
    <button class="tb" id="tb-h1" title="Heading 1"><span class="tb-label">H1</span></button>
    <button class="tb" id="tb-h2" title="Heading 2"><span class="tb-label">H2</span></button>
    <button class="tb" id="tb-h3" title="Heading 3"><span class="tb-label">H3</span></button>
    <div class="tsep"></div>
    <!-- lists -->
    <button class="tb" id="tb-ul" title="Bullet list">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="4" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
    </button>
    <button class="tb" id="tb-ol" title="Numbered list">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><path d="M4 6h1v4M4 10h2" stroke-linecap="round"/><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <button class="tb" id="tb-bq" title="Blockquote">
      <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2 1 0 1 0 1 1v1c0 1-1 2-2 2s-1 .008-1 1.031V20c0 1 0 1 1 1zm12 0c3 0 7-1 7-8V5c0-1.25-.757-2.017-2-2h-4c-1.25 0-2 .75-2 1.972V11c0 1.25.75 2 2 2h.75c0 2.25.25 4-2.75 4v3c0 1 0 1 1 1z"/></svg>
    </button>
    <div class="tsep"></div>
    <!-- align -->
    <button class="tb" id="tb-al" title="Align left">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="18" y2="18"/></svg>
    </button>
    <button class="tb" id="tb-ac" title="Center">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="6" y1="12" x2="18" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>
    </button>
    <button class="tb" id="tb-ar" title="Align right">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="9" y1="12" x2="21" y2="12"/><line x1="6" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="tsep"></div>
    <!-- undo / redo / clear -->
    <button class="tb" id="tb-undo" title="Undo (Ctrl+Z)">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
    </button>
    <button class="tb" id="tb-redo" title="Redo (Ctrl+Shift+Z)">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-.49-4.5"/></svg>
    </button>
    <button class="tb" id="tb-clr" title="Clear document">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
    </button>
    <div class="counts">
      W:<b id="wc">0</b>&nbsp; C:<b id="cc">0</b>&nbsp; L:<b id="lc">1</b>
    </div>
  </div>

  <div class="ewrap">
    <div class="page">
      <div class="ruler-row" id="ruler"></div>
      <div id="editor"
           contenteditable="true"
           spellcheck="true"
           data-ph="Start typing… changes sync in real time ✦"></div>
    </div>
  </div>

  <div class="sbar">
    <span class="si" id="sbDoc">doc / 1</span>
    <span class="si grn" id="sbSave">● Saved</span>
    <span class="si" id="sbPos">Ln 1, Col 1</span>
    <span class="si" id="sbSel"></span>
    <span class="si">UTF-8</span>
    <span class="si">WebSocket</span>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs/lib/stomp.min.js"></script>
<script>
'use strict';

/* ---------- DOM shortcuts ---------- */
const $  = id => document.getElementById(id);
const ed = $('editor');

/* ---------- State ---------- */
let docId      = '1';
let stomp      = null;
let syncing    = false;
let saveTimer  = null;

/* ---------- Ruler ---------- */
(function buildRuler(){
  const r = $('ruler');
  for(let i = 0; i <= 16; i++){
    const pct = (i / 16) * 100;
    const m = document.createElement('div');
    m.style.cssText = `position:absolute;bottom:2px;left:${pct}%;width:1px;background:var(--bdr);height:${i%4===0?'10':'5'}px`;
    r.appendChild(m);
    if(i > 0 && i % 4 === 0){
      const l = document.createElement('div');
      l.style.cssText = `position:absolute;bottom:4px;left:${pct}%;font-size:8px;color:var(--mut);font-family:'JetBrains Mono',monospace;transform:translateX(-50%)`;
      l.textContent = (i/2) + 'cm';
      r.appendChild(l);
    }
  }
})();

/* ---------- Splash ---------- */
function hideSplash(){ setTimeout(()=> $('splash').classList.add('gone'), 200); }
const splashKill = setTimeout(()=>{
  hideSplash();
  setNet('err','Offline mode');
  toast('⚠️ No backend – editing offline');
}, 3000);

/* ---------- Network ---------- */
function setNet(cls, txt){
  $('netBadge').className = 'badge ' + cls;
  $('netTxt').textContent = txt;
}

function connect(){
  let sock;
  try { sock = new SockJS('http://localhost:8080/ws'); }
  catch(e){ clearTimeout(splashKill); hideSplash(); setNet('err','Offline'); return; }
  stomp = Stomp.over(sock);
  stomp.debug = null;
  stomp.connect({}, function onConn(){
    clearTimeout(splashKill);
    setNet('conn','Connected');
    hideSplash();
    subscribeDoc();
    loadDocContent();
  }, function onErr(){
    clearTimeout(splashKill);
    hideSplash();
    setNet('err','Disconnected');
    toast('⚠️ Backend offline – retrying in 5s…');
    setTimeout(connect, 5000);
  });
}

function subscribeDoc(){
  if(!stomp || !stomp.connected) return;
  stomp.subscribe('/topic/document/' + docId, function(msg){
    // save caret, apply remote content, restore caret
    const pos = getCaretPos();
    syncing = true;
    ed.innerHTML = msg.body;
    syncing = false;
    setCaretPos(pos);
    counts();
    save('saved');
  });
}

function loadDocContent(){
  fetch('http://localhost:8080/docs/' + docId)
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if(!data) return;
      ed.innerHTML = data.content || '';
      counts();
      save('saved');
      $('sbDoc').textContent = 'doc / ' + docId;
    })
    .catch(()=>{});
}

/* ---------- Load button ---------- */
$('btnLoad').addEventListener('click', function(){
  const v = $('docIn').value.trim();
  if(!v) return;
  docId = v;
  $('sbDoc').textContent = 'doc / ' + docId;
  subscribeDoc();
  loadDocContent();
  toast('📄 Loaded doc ' + docId);
});
$('docIn').addEventListener('keydown', e => { if(e.key==='Enter') $('btnLoad').click(); });

/* ---------- Editor: input ---------- */
ed.addEventListener('input', function(){
  counts();
  save('saving');
  clearTimeout(saveTimer);
  if(!syncing && stomp && stomp.connected)
    stomp.send('/app/edit/' + docId, {}, ed.innerHTML);
  saveTimer = setTimeout(()=> save('saved'), 1200);
});

/* ---------- Editor: keydown ---------- */
ed.addEventListener('keydown', function(e){
  const ctrl = e.ctrlKey || e.metaKey;

  /* Tab = 4 spaces, never lose focus */
  if(e.key === 'Tab'){
    e.preventDefault();
    execCmd('insertHTML', '&nbsp;&nbsp;&nbsp;&nbsp;');
    return;
  }

  /* Shortcuts */
  if(ctrl){
    if(e.key==='b'){ e.preventDefault(); execCmd('bold'); return; }
    if(e.key==='i'){ e.preventDefault(); execCmd('italic'); return; }
    if(e.key==='u'){ e.preventDefault(); execCmd('underline'); return; }
    if(e.key==='s'){ e.preventDefault(); toast('✓ Saved'); return; }
    if(e.key==='z' && e.shiftKey){ e.preventDefault(); execCmd('redo'); return; }
  }

  /* Enter inside a heading → drop back to div paragraph */
  if(e.key === 'Enter'){
    const block = getBlock();
    if(block && /^H[123]$/.test(block.nodeName)){
      e.preventDefault();
      execCmd('insertParagraph');
      execCmd('formatBlock','div');
      return;
    }
  }
});

/* ---------- Editor: selection events ---------- */
ed.addEventListener('keyup',   onSelChange);
ed.addEventListener('mouseup', onSelChange);
ed.addEventListener('focus',   onSelChange);
document.addEventListener('selectionchange', onSelChange);

function onSelChange(){
  cursorPos();
  selCount();
  toolbarState();
}

/* ---------- execCommand wrapper ---------- */
function execCmd(cmd, val){
  /* Must have focus; must NOT lose selection */
  ed.focus();
  try { document.execCommand(cmd, false, val !== undefined ? val : null); }
  catch(e){}
  counts();
  cursorPos();
  toolbarState();
  ed.dispatchEvent(new Event('input'));
}

/* ---------- Toolbar wiring ----------
   Key: mousedown e.preventDefault() keeps selection alive in editor
   while still allowing the click to fire. Without this, clicking a
   toolbar button blurs the editor and kills the selection first.
*/
function wire(id, fn){
  const el = $(id);
  if(!el) return;
  el.addEventListener('mousedown', e => e.preventDefault());
  el.addEventListener('click',     e => { e.preventDefault(); fn(); });
}

wire('tb-b',    ()=> execCmd('bold'));
wire('tb-i',    ()=> execCmd('italic'));
wire('tb-u',    ()=> execCmd('underline'));
wire('tb-s',    ()=> execCmd('strikeThrough'));
wire('tb-h1',   ()=> execCmd('formatBlock','h1'));
wire('tb-h2',   ()=> execCmd('formatBlock','h2'));
wire('tb-h3',   ()=> execCmd('formatBlock','h3'));
wire('tb-ul',   ()=> execCmd('insertUnorderedList'));
wire('tb-ol',   ()=> execCmd('insertOrderedList'));
wire('tb-bq',   ()=> execCmd('formatBlock','blockquote'));
wire('tb-al',   ()=> execCmd('justifyLeft'));
wire('tb-ac',   ()=> execCmd('justifyCenter'));
wire('tb-ar',   ()=> execCmd('justifyRight'));
wire('tb-undo', ()=> execCmd('undo'));
wire('tb-redo', ()=> execCmd('redo'));

/* clear needs confirm, handle separately */
$('tb-clr').addEventListener('mousedown', e => e.preventDefault());
$('tb-clr').addEventListener('click', function(){
  if(!confirm('Clear entire document?')) return;
  ed.innerHTML = '';
  ed.focus();
  ed.dispatchEvent(new Event('input'));
  toast('🗑 Cleared');
});

/* font / size selects — stopPropagation not preventDefault so they still work */
$('selFont').addEventListener('mousedown', e => e.stopPropagation());
$('selFont').addEventListener('change', function(){
  const map = {mono:"'JetBrains Mono',monospace", syne:"'Syne',sans-serif",
                serif:"Georgia,serif", sys:"system-ui,sans-serif"};
  ed.style.fontFamily = map[this.value];
  ed.focus();
});
$('selSize').addEventListener('mousedown', e => e.stopPropagation());
$('selSize').addEventListener('change', function(){
  ed.style.fontSize = this.value + 'px';
  ed.focus();
});

/* ---------- Toolbar active states ---------- */
function toolbarState(){
  if(!document.activeElement || !ed.contains(document.activeElement) && document.activeElement !== ed) return;
  const map = [
    ['bold','tb-b'],['italic','tb-i'],['underline','tb-u'],['strikeThrough','tb-s'],
    ['justifyLeft','tb-al'],['justifyCenter','tb-ac'],['justifyRight','tb-ar']
  ];
  map.forEach(([cmd,id])=>{
    try{ $(id).classList.toggle('on', document.queryCommandState(cmd)); }catch(e){}
  });
}

/* ---------- Word / char / line counts ---------- */
function counts(){
  const txt = ed.innerText || '';
  const tr  = txt.trim();
  $('wc').textContent = tr ? tr.split(/\s+/).length : 0;
  $('cc').textContent = tr.length;
  $('lc').textContent = txt ? txt.split('\n').length : 1;
}

/* ---------- Cursor line/col ---------- */
function cursorPos(){
  const sel = window.getSelection();
  if(!sel || !sel.rangeCount) return;
  if(!ed.contains(sel.anchorNode) && sel.anchorNode !== ed) return;
  try{
    const range = sel.getRangeAt(0);
    const pre   = range.cloneRange();
    pre.selectNodeContents(ed);
    pre.setEnd(range.startContainer, range.startOffset);
    const lines = pre.toString().split('\n');
    $('sbPos').textContent = 'Ln ' + lines.length + ', Col ' + (lines[lines.length-1].length + 1);
  }catch(e){}
}

function selCount(){
  const sel = window.getSelection();
  const el  = $('sbSel');
  if(!sel || sel.isCollapsed || !ed.contains(sel.anchorNode)){
    el.textContent = ''; return;
  }
  const n = sel.toString().length;
  el.textContent = n ? n + ' sel' : '';
}

/* ---------- Caret save / restore (for WS sync) ---------- */
function getCaretPos(){
  const sel = window.getSelection();
  if(!sel || !sel.rangeCount) return 0;
  try{
    const r = sel.getRangeAt(0);
    const pre = r.cloneRange();
    pre.selectNodeContents(ed);
    pre.setEnd(r.startContainer, r.startOffset);
    return pre.toString().length;
  }catch(e){ return 0; }
}

function setCaretPos(offset){
  const sel = window.getSelection();
  if(!sel) return;
  // Walk text nodes to find right position
  const walk = document.createTreeWalker(ed, NodeFilter.SHOW_TEXT);
  let remaining = offset;
  let node = null;
  let nodeOff = 0;
  while(walk.nextNode()){
    const n = walk.currentNode;
    if(remaining <= n.length){ node = n; nodeOff = remaining; break; }
    remaining -= n.length;
  }
  try{
    const range = document.createRange();
    if(node){
      range.setStart(node, nodeOff);
    } else {
      range.selectNodeContents(ed);
      range.collapse(false);
    }
    range.collapse(true);
    sel.removeAllRanges();
    sel.addRange(range);
  }catch(e){}
}

/* ---------- Helper: get current block element ---------- */
function getBlock(){
  const sel = window.getSelection();
  if(!sel || !sel.rangeCount) return null;
  let n = sel.getRangeAt(0).commonAncestorContainer;
  while(n && n !== ed){
    if(n.nodeType === 1 && window.getComputedStyle(n).display !== 'inline') return n;
    n = n.parentNode;
  }
  return null;
}

/* ---------- Save state ---------- */
function save(s){
  const el = $('sbSave');
  if(s==='saving'){ el.className='si anim'; el.textContent='◌ Saving…'; }
  else            { el.className='si grn';  el.textContent='● Saved'; }
}

/* ---------- Share ---------- */
$('btnShare').addEventListener('click', function(){
  const url = location.origin + location.pathname + '?doc=' + encodeURIComponent(docId);
  navigator.clipboard.writeText(url)
    .then(()=> toast('🔗 Link copied!'))
    .catch(()=> toast('🔗 ' + url));
});

/* ---------- Export ---------- */
$('btnExport').addEventListener('click', function(){
  const txt  = ed.innerText || '';
  const blob = new Blob([txt], {type:'text/plain'});
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'doc-' + docId + '.txt';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('💾 Exported doc-' + docId + '.txt');
});

/* ---------- Toast ---------- */
let toastTimer;
function toast(msg){
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> t.classList.remove('on'), 2600);
}

/* ---------- Global keyboard shortcuts ---------- */
document.addEventListener('keydown', function(e){
  if((e.ctrlKey||e.metaKey) && e.key==='s'){
    e.preventDefault();
    toast('✓ Saved');
  }
});

/* ---------- Online count (simulated) ---------- */
setInterval(function(){
  if(Math.random() < .1){
    // just cosmetic — real count would come from backend presence
  }
}, 6000);

/* ---------- Boot ---------- */
connect();
</script>
